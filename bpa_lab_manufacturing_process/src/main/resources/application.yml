camunda:
  client:
    mode: self-managed
    zeebe:
      enabled: true
      rest-address: ${ZEEBE_REST_ADRESS:http://localhost:8088}
      grpc-address: ${ZEEBE_GRPC_ADRESS:http://localhost:26500}

# MQTT Client Configuration
# first attempt with FtFactory Cloud Broker
  spring:
    config:
      activate:
        on-profile: factory
  ftfactorymqttclient:
    broker: ws://10.0.0.21:8081
    clientId: FTFactoryMQTTClient

    # MQTT Topics Configuration
    cloudTopicPrefix: bpalab/ftfactory
    cloudPubOrderTopic: bpalab/ftfactory/f/o/order
    cloudBroadcastTopic: bpalab/ftfactory/o/broadcast
    cloudSubOrderTopic: bpalab/ftfactory/f/i/order
    cloudHBWTopic: bpalab/ftfactory/f/i/stock
    cloudBME680Topic: bpalab/ftfactory/i/bme680


spring:
  config:
    activate:
      on-profile: local
ftfactorymqttclient:
  #broker: ws://host.docker.internal:9001
  broker: ws://localhost:9001
  clientId: FTFactoryMQTTClient

  # MQTT Topics Configuration
  cloudTopicPrefix: bpalab/ftfactory
  cloudPubOrderTopic: bpalab/ftfactory/f/o/order
  cloudBroadcastTopic: bpalab/ftfactory/o/broadcast
  cloudSubOrderTopic: bpalab/ftfactory/f/i/order
  cloudHBWTopic: bpalab/ftfactory/f/i/stock
  cloudBME680Topic: bpalab/ftfactory/i/bme680

