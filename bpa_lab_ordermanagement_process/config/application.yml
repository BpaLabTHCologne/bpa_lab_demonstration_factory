camunda:
  client:
    mode: self-managed
    zeebe:
      enabled: true

spring:
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:mysql://localhost:3070/bpa_lab_demonstration_factory?serverTimezone=UTC}
    username: ${JDBC_DATABASE_USERNAME:root}
    password: ${JDBC_DATABASE_PASSWORD:P4ssword!}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        id:
          new_generator_mappings: true
        type:
          preferred_uuid_jdbc_type: CHAR
#        format_sql: true
  docker:
    compose:
      lifecycle-management: start-only
      file: ../docker-compose.yml
server:
  port: 9090
